<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>出租车轨迹地图</title>
    <link rel="stylesheet" href="css/styles.css">
    <!-- 引入百度地图API -->
    <script type="text/javascript" src="https://api.map.baidu.com/api?v=1.0&&type=webgl&ak=TjH2DBugCdwnk9PDVFl4B0wF0CC0v47N"></script>

</head>
<body>
<h1>出租车数据分析系统</h1>

<!-- 功能导航栏 -->
<div class="function-nav">
    <button class="function-btn" data-target="f1">F1: 出租车轨迹查询</button>
    <button class="function-btn" data-target="f2">F2: 地图缩放</button>
    <button class="function-btn" data-target="f3">F3: 区域范围查找</button>
    <button class="function-btn" data-target="f4">F4: 区域车流密度分析</button>
    <button class="function-btn" data-target="f5">F5: 区域关联分析1</button>
    <button class="function-btn" data-target="f6">F6: 区域关联分析2</button>
    <button class="function-btn" data-target="f7">F7: 频繁路径分析1</button>
    <button class="function-btn" data-target="f8">F8: 频繁路径分析2</button>
    <button class="function-btn" data-target="f9">F9: 通信时间分析</button>
    <!-- 添加清除按钮 -->
    <button id="clearMapBtn" class="clear-map-btn">清除地图覆盖物</button>
</div>

<!-- 功能区域容器 -->
<div id="function-panels">
    <!-- F1: 出租车轨迹查询 -->
    <div id="f1" class="search-section">
        <h3>F1: 出租车轨迹查询</h3>
        <div class="form-row">
            <label for="taxiId">出租车ID:</label>
            <input type="text" id="taxiId" placeholder="请输入出租车ID">
            <button id="queryTrajectoryBtn">查询轨迹</button>
        </div>
        <!-- 添加结果显示区域 -->
        <div id="f1_result"></div>
    </div>

    <!-- F2: 地图缩放 (占位) -->
    <div id="f2" class="search-section">
        <h3>F2: 地图缩放</h3>
        <div class="form-row">
            <p>请使用地图上的缩放控件或鼠标滚轮进行地图缩放操作。</p>
        </div>
    </div>

    <!-- F3: 区域范围查找 -->
    <div id="f3" class="search-section">
        <h3>F3: 区域范围查找</h3>
        <div class="form-row">
            <label>时间段:</label>
            <input type="datetime-local" id="f3_startTime" min="2008-02-02T00:00" max="2008-02-08T11:59" value="2008-02-02T00:00">
            <span>至</span>
            <input type="datetime-local" id="f3_endTime" min="2008-02-02T00:00" max="2008-02-08T11:59" value="2008-02-03T00:00">
        </div>
        <div class="form-row">
            <label>左上角坐标:</label>
            <input type="text" id="f3_topLeftLng" placeholder="经度">
            <input type="text" id="f3_topLeftLat" placeholder="纬度">
        </div>
        <div class="form-row">
            <label>右下角坐标:</label>
            <input type="text" id="f3_bottomRightLng" placeholder="经度">
            <input type="text" id="f3_bottomRightLat" placeholder="纬度">
        </div>
        <button id="areaSearchBtn">区域查找</button>
        <!-- 添加结果显示区域 -->
        <div id="f3_result"></div>
    </div>

    <!-- F4: 区域车流密度分析 -->
    <div id="f4" class="search-section">
        <h3>F4: 区域车流密度分析</h3>
        <div class="form-row">
            <label>时间段:</label>
            <input type="datetime-local" id="f4_startTime" min="2008-02-02T00:00" max="2008-02-08T11:59" value="2008-02-02T14:30">
            <span>至</span>
            <input type="datetime-local" id="f4_endTime" min="2008-02-02T00:00" max="2008-02-08T11:59" value="2008-02-02T15:30">
        </div>
        <div class="form-row">
            <label>左上角坐标:</label>
            <input type="text" id="f4_topLeftLng" placeholder="经度" value="116.0">
            <input type="text" id="f4_topLeftLat" placeholder="纬度" value="40.5">
        </div>
        <div class="form-row">
            <label>右下角坐标:</label>
            <input type="text" id="f4_bottomRightLng" placeholder="经度" value="117.0">
            <input type="text" id="f4_bottomRightLat" placeholder="纬度" value="39.5">
        </div>
        <div class="form-row">
            <label>网格半径(r):</label>
            <input type="number" id="gridRadius" placeholder="网格半径" value="10">
        </div>
        <div class="form-row">
            <label>时间跨度：</label>
            <input type="number" id="timeInterval" placeholder="时间跨度" value="60">
        </div>
        <!-- 新增时间点选择器 -->
        <div class="form-row">
            <button id="prevTimeSlot">&lt; 上一个</button>
            <input type="text" id="currentTimeSlot" readonly style="width: 220px; text-align: center">
            <button id="nextTimeSlot">下一个 &gt;</button>
        </div>
        <button id="densityAnalysisBtn">密度分析</button>
        <!-- 添加结果显示区域 -->
        <div id="f4_result"></div>
    </div>

    <!-- F5: 区域关联分析1 -->
    <div id="f5" class="search-section">
        <h3>F5: 区域关联分析1</h3>
        <div class="form-row">
            <label>时间段:</label>
            <input type="datetime-local" id="f5_startTime" min="2008-02-02T00:00" max="2008-02-08T11:59" value="2008-02-06T08:00">
            <span>至</span>
            <input type="datetime-local" id="f5_endTime" min="2008-02-02T00:00" max="2008-02-08T11:59" value="2008-02-07T10:00">
        </div>
        <div class="form-group">
            <h4>区域1</h4>
            <div class="form-row">
                <label>左下角坐标:</label>
                <input type="text" id="f5_area1_topLeftLng" placeholder="经度" value="116">
                <input type="text" id="f5_area1_topLeftLat" placeholder="纬度" value="39.5">
            </div>
            <div class="form-row">
                <label>右上角坐标:</label>
                <input type="text" id="f5_area1_bottomRightLng" placeholder="经度" value="116.5">
                <input type="text" id="f5_area1_bottomRightLat" placeholder="纬度" value="40.0">
            </div>
        </div>
        <div class="form-group">
            <h4>区域2</h4>
            <div class="form-row">
                <label>左下角坐标:</label>
                <input type="text" id="f5_area2_topLeftLng" placeholder="经度" value="116.5">
                <input type="text" id="f5_area2_topLeftLat" placeholder="纬度" value="40.0">
            </div>
            <div class="form-row">
                <label>右上角坐标:</label>
                <input type="text" id="f5_area2_bottomRightLng" placeholder="经度" value="117.0">
                <input type="text" id="f5_area2_bottomRightLat" placeholder="纬度" value="40.5">
            </div>
        </div>
        <div class="form-row">
            <label>时间跨度：</label>
            <input type="number" id="f5_timeInterval" placeholder="时间跨度" value="30">
        </div>
        <div class="form-row time-selector">
            <label>时间点选择:</label>
            <button id="f5_prevTime">&lt; 上一个</button>
            <input type="text" id="f5_currentTime" readonly style="width: 180px; text-align: center">
            <button id="f5_nextTime">下一个 &gt;</button>
        </div>
        <button id="areaCorrelation1Btn">区域关联分析1</button>
        <div id="f5_result"></div>
        <div id="f5_flow_display" class="flow-display">
            <div class="flow-info">
                <h4>当前时间点车流量</h4>
                <div class="flow-data">
                    <div class="flow-direction">
                        <span>区域1 → 区域2:</span>
                        <span id="flow_1_to_2" class="flow-value">-</span>
                    </div>
                    <div class="flow-direction">
                        <span>区域2 → 区域1:</span>
                        <span id="flow_2_to_1" class="flow-value">-</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- F6: 区域关联分析2 -->
    <div id="f6" class="search-section">
        <h3>F6: 区域关联分析2</h3>
        <div class="form-row">
            <label>时间段:</label>
            <input type="datetime-local" id="f6_startTime" min="2008-02-02T00:00" max="2008-02-08T11:59" value="2008-02-06T08:00">
            <span>至</span>
            <input type="datetime-local" id="f6_endTime" min="2008-02-02T00:00" max="2008-02-08T11:59" value="2008-02-07T10:00">
        </div>
        <div class="form-group">
            <h4>指定区域</h4>
            <div class="form-row">
                <label>左上角坐标:</label>
                <input type="text" id="f6_topLeftLng" placeholder="经度" value="116.0">
                <input type="text" id="f6_topLeftLat" placeholder="纬度" value="39.5">
            </div>
            <div class="form-row">
                <label>右下角坐标:</label>
                <input type="text" id="f6_bottomRightLng" placeholder="经度" value="116.5">
                <input type="text" id="f6_bottomRightLat" placeholder="纬度" value="40.0">
            </div>
        </div>
        <div class="form-row">
            <label>时间跨度：</label>
            <input type="number" id="f6_timeInterval" placeholder="时间跨度" value="30">
        </div>
        <div class="form-row time-selector">
            <label>时间点选择:</label>
            <button id="f6_prevTime">&lt; 上一个</button>
            <input type="text" id="f6_currentTime" readonly style="width: 180px; text-align: center">
            <button id="f6_nextTime">下一个 &gt;</button>
        </div>
        <button id="areaCorrelation2Btn">区域关联分析2</button>
        <div id="f6_result"></div>
        <div id="f6_flow_display" class="flow-display">
            <div class="flow-info">
                <h4>当前时间点车流量</h4>
                <div class="flow-data">
                    <div class="flow-direction">
                        <span>进入区域:</span>
                        <span id="flow_enter" class="flow-value">-</span>
                    </div>
                    <div class="flow-direction">
                        <span>离开区域:</span>
                        <span id="flow_leave" class="flow-value">-</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- F7: 频繁路径分析1 -->
    <div id="f7" class="search-section">
        <h3>F7: 频繁路径分析1</h3>
        <div class="form-row">
            <label>参数k:</label>
            <input type="number" id="f7_k" placeholder="最频繁路径数量" min="1" value="5">
        </div>
        <div class="form-row">
            <label>距离参数x:</label>
            <input type="number" id="f7_distance" placeholder="最小路径长度" min="0" step="0.1" value="1.0">
        </div>
        <button id="frequentPath1Btn">分析频繁路径</button>

        <!-- 路径选择器 -->
        <div class="form-row path-selector-container" style="display: none;" id="pathSelectorContainer">
            <div class="path-navigation">
                <button id="prevPathBtn" class="path-nav-btn">&lt; 上一条</button>
                <select id="path_selector" class="path-selector">
                    <!-- 选项将通过JavaScript填充 -->
                </select>
                <button id="nextPathBtn" class="path-nav-btn">下一条 &gt;</button>
            </div>
        </div>

        <!-- 路径详情 -->
        <div id="path_details" class="path-info" style="display: none;"></div>

        <!-- 结果区域 -->
        <div id="f7_result"></div>
    </div>

    <!-- F8: 频繁路径分析2 -->
    <div id="f8" class="search-section">
        <h3>F8: 频繁路径分析2</h3>
        <div class="form-row">
            <label>参数k:</label>
            <input type="number" id="f8_k" placeholder="最频繁路径数量" min="1" value="5">
        </div>
        <div class="form-group">
            <h4>区域A</h4>
            <div class="form-row">
                <label>左上角坐标:</label>
                <input type="text" id="f8_areaA_topLeftLng" placeholder="经度" value="116.30">
                <input type="text" id="f8_areaA_topLeftLat" placeholder="纬度" value="39.97">
            </div>
            <div class="form-row">
                <label>右下角坐标:</label>
                <input type="text" id="f8_areaA_bottomRightLng" placeholder="经度" value="116.34">
                <input type="text" id="f8_areaA_bottomRightLat" placeholder="纬度" value="40.01">
            </div>
        </div>
        <div class="form-group">
            <h4>区域B</h4>
            <div class="form-row">
                <label>左上角坐标:</label>
                <input type="text" id="f8_areaB_topLeftLng" placeholder="经度" value="116.45">
                <input type="text" id="f8_areaB_topLeftLat" placeholder="纬度" value="39.89">
            </div>
            <div class="form-row">
                <label>右下角坐标:</label>
                <input type="text" id="f8_areaB_bottomRightLng" placeholder="经度" value="116.49">
                <input type="text" id="f8_areaB_bottomRightLat" placeholder="纬度" value="39.93">
            </div>
        </div>
        <button id="frequentPath2Btn">分析区域间频繁路径</button>
        <!-- 路径选择器 -->
        <div class="form-row path-selector-container" style="display: none;" id="f8PathSelectorContainer">
            <div class="path-navigation">
                <button id="f8PrevPathBtn" class="path-nav-btn">&lt; 上一条</button>
                <select id="f8_path_selector" class="path-selector">
                    <!-- 选项将通过JavaScript填充 -->
                </select>
                <button id="f8NextPathBtn" class="path-nav-btn">下一条 &gt;</button>
            </div>
        </div>

        <!-- 路径详情 -->
        <div id="f8_path_details" class="path-info" style="display: none;"></div>
        <div id="f8_result"></div>
    </div>

    <!-- F9: 通信时间分析 -->
    <div id="f9" class="search-section">
        <h3>F9: 通信时间分析</h3>
        <div class="form-row">
            <label>时间段:</label>
            <input type="datetime-local" id="f9_startTime" min="2008-02-02T00:00" max="2008-02-08T11:59" value="2008-02-03T08:00">
            <span>至</span>
            <input type="datetime-local" id="f9_endTime" min="2008-02-02T00:00" max="2008-02-08T11:59" value="2008-02-03T10:00">
        </div>
        <div class="form-group">
            <h4>区域A</h4>
            <div class="form-row">
                <label>左下角坐标:</label>
                <input type="text" id="f9_areaA_topLeftLng" placeholder="经度" value="116.45">
                <input type="text" id="f9_areaA_topLeftLat" placeholder="纬度" value="40.0">
            </div>
            <div class="form-row">
                <label>右上角坐标:</label>
                <input type="text" id="f9_areaA_bottomRightLng" placeholder="经度" value="116.5">
                <input type="text" id="f9_areaA_bottomRightLat" placeholder="纬度" value="40.05">
            </div>
        </div>
        <div class="form-group">
            <h4>区域B</h4>
            <div class="form-row">
                <label>左下角坐标:</label>
                <input type="text" id="f9_areaB_topLeftLng" placeholder="经度" value="116.44">
                <input type="text" id="f9_areaB_topLeftLat" placeholder="纬度" value="39.9">
            </div>
            <div class="form-row">
                <label>右上角坐标:</label>
                <input type="text" id="f9_areaB_bottomRightLng" placeholder="经度" value="116.48">
                <input type="text" id="f9_areaB_bottomRightLat" placeholder="纬度" value="39.92">
            </div>
        </div>
        <button id="communicationTimeBtn">分析最短通行时间</button>
        <div id="f9_result"></div>
    </div>

</div>

<!-- 地图容器 -->
<div id="container"></div>
<div id="result"></div>



<!-- JavaScript -->
<script>
    document.addEventListener('DOMContentLoaded', function() {
        // 功能切换逻辑
        const functionBtns = document.querySelectorAll('.function-btn');
        const searchSections = document.querySelectorAll('.search-section');

        // 初始状态下不显示任何功能区域
        searchSections.forEach(section => {
            section.style.display = 'none';
        });

        // 添加点击事件
        functionBtns.forEach(btn => {
            btn.addEventListener('click', function() {
                // 移除所有active类
                functionBtns.forEach(b => b.classList.remove('active'));

                // 隐藏所有功能区域
                searchSections.forEach(section => {
                    section.style.display = 'none';
                });

                // 添加active类到当前按钮
                this.classList.add('active');

                // 显示对应的功能区域
                const targetId = this.getAttribute('data-target');
                document.getElementById(targetId).style.display = 'block';
            });
        });

        // 添加清除地图覆盖物按钮事件
        document.getElementById('clearMapBtn').addEventListener('click', function() {
            clearOverlays();
        });
    });
</script>

<!-- 引入JavaScript文件 -->
<script src="js/utils/map-utils.js"></script>
<script src="js/features/f1-trajectory.js"></script>
<script src="js/features/f2-zoom.js"></script>
<script src="js/features/f3-area-search.js"></script>
<script src="js/features/f4-density.js"></script>
<script src="js/features/f5-RegionCorrelation1.js"></script>
<script src="js/features/f6-RegionCorrelation2.js"></script>
<script src="js/features/f7.js"></script>
<script src="js/features/f8.js"></script>
<script src="js/features/f9.js"></script>
<script src="js/main.js"></script>
</body>
</html>
