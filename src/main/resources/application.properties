spring.application.name=TaxiTrajectory

server.port=8080

# data path
taxi.data.path:classpath:data/*.txt


# TODO: add log function for all service and inject enabled property
# logging for service layer, if false, log in service layer will not output
logging.service.enabled=true
# logging for repository layer, if false, log in repository layer will not output
logging.repository.enabled=false

# Cache Configuration for Taxi Data
# Maximum number of taxi trajectory entries to keep in memory cache
cache.taxi.maxSize=5000
# Evict entries after this many minutes of inactivity (last access)
cache.taxi.expireAfterAccessMinutes=60